#
# ~/.config/picom/picom.conf
#
# Void Space — picom configuration

# ── Backend ───────────────────────────────────────────────────────────────────
backend = "glx";
vsync = true;
glx-no-stencil = true;
use-damage = true;

# ── Sombras ───────────────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.4;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Dunst'",
    "class_g = 'rofi'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ── Fading ────────────────────────────────────────────────────────────────────
fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
fade-exclude = [
    "class_g = 'rofi'"
];

# ── Transparência ─────────────────────────────────────────────────────────────
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
    "95:class_g = 'kitty' && focused",
    "75:class_g = 'kitty' && !focused"
];

# ── Blur ──────────────────────────────────────────────────────────────────────
blur-method = "dual_kawase";
blur-strength = 8;
blur-background = false;
blur-background-frame = false;
blur-background-fixed = false;
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'rofi'",
    "class_g = 'Dunst'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ── Performance ───────────────────────────────────────────────────────────────
# Desativa compositing em fullscreen (jogos, vídeo)
unredir-if-possible = true;
unredir-if-possible-exclude = [
    "class_g = 'kitty'"
];

# ── Detecção de janela ativa ──────────────────────────────────────────────────
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-ewmh-active-win = false;
