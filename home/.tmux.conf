# tmux package manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# vim-tmux-navigator
set -g @plugin 'christoomey/vim-tmux-navigator'

# crtl+hjkl to move between tmux panels and vim splits
set -g @vim_navigator_mapping_left "C-Left C-h"  # use C-h and C-Left
set -g @vim_navigator_mapping_right "C-Right C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev ""  # removes the C-\ binding

is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# general settings
set -g monitor-activity on 
set -g mouse on

# set default terminal for proper color/feature support
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-kitty:RGB"

# enable Undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  
# enable Undercurl colors
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# lag com esc nvim
set -sg escape-time 0

# mouse dragging to system clipboard
# bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

set -g base-index 1
setw -g pane-base-index 1

# status bar
set -g status-position top
set -g status-interval 5
set -g status-justify left
set -g status-left-length  40
set -g status-right-length 80
# status bar segments
set -g status-left  " #S "
set -g status-right " #{?window_zoomed_flag,[Z] ,}#{?synchronize-panes,[SYNC] ,}#{?client_prefix,[P] ,}"
set -g window-status-format         " #I:#W  "
set -g window-status-current-format " #I:#W  "
set -g window-status-separator " "

# void-space color scheme 
source-file ~/.tmux/themes/void-space-tmux.conf

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
